# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: '%env(APP_SECRET)%'
    trusted_hosts: '%env(string:TRUSTED_HOSTS)%'
    # Note that the session will be started ONLY if you read or write from it.
    session:
        enabled: true
    rate_limiter:
        # Public auth endpoints are rate-limited to reduce brute-force, flood
        # and backend resource abuse. When the configured window is exhausted,
        # the application returns HTTP 429 with a Retry-After header.
        api_user_login:
            policy: 'sliding_window'
            limit: 5
            interval: '1 minute'
        api_user_login_new_qr:
            policy: 'sliding_window'
            limit: 10
            interval: '1 minute'
        api_user_login_check:
            policy: 'sliding_window'
            limit: 30
            interval: '1 minute'
        api_user_registration:
            policy: 'sliding_window'
            limit: 3
            interval: '1 minute'
        api_user_login_callback:
            policy: 'sliding_window'
            limit: 10
            interval: '1 minute'
        api_user_registration_callback:
            policy: 'sliding_window'
            limit: 10
            interval: '1 minute'

    #esi: true
    #fragments: true

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
